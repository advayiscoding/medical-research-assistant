# Development infrastructure. Application services (backend, frontend,
# chromadb) are added in the Dockerization phase; postgres comes first because
# every phase after the database layer needs it.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medresearch
      POSTGRES_PASSWORD: medresearch # local dev only — prod uses managed DB + Key Vault
      POSTGRES_DB: medresearch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medresearch"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
